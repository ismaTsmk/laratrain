services:
  # PHP Service
  php:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: laratrain_php
    volumes:
      - .:/app
    command: php artisan serve --host=0.0.0.0 --port=8000
    networks:
      - laratrain_network

  # Worker Service
  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: laratrain_worker
    restart: always
    volumes:
      - .:/app
    command: php artisan queue:work --tries=3 --timeout=90
    depends_on:
      - db
      - redis
    networks:
      - laratrain_network

  # Nginx Service
  nginx:
    image: nginx:alpine
    container_name: laratrain_nginx
    restart: always
    ports:
      # Uncommon port 8181 -> container 80
      - "8181:80"
    volumes:
      - .:/app
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - php
    networks:
      - laratrain_network

  # Database Service (PostgreSQL)
  db:
    image: postgres:alpine
    container_name: laratrain_db
    restart: always
    environment:
      POSTGRES_DB: ${DB_DATABASE:-laratrain}
      POSTGRES_USER: ${DB_USERNAME:-laratrain_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret_password}
    ports:
      # Port host 55432 : 5432 internal
      - "${DB_PORT_HOST:-55432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - laratrain_network

  # Redis Service
  redis:
    image: redis:alpine
    container_name: laratrain_redis
    restart: always
    ports:
      # Port host 63790 : 6379 internal
      - "${REDIS_PORT_HOST:-63790}:6379"
    volumes:
      - redis_data:/data
    networks:
      - laratrain_network

networks:
  laratrain_network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
